<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кабинет менеджера MatMix</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/manager.css">
</head>
<body>
    <main class="crm-shell">
        <aside class="crm-sidebar" aria-label="Навигация CRM">
            <div class="crm-brand">
                <strong>MatMix CRM</strong>
                <span>Кабинет менеджера</span>
            </div>

            <nav class="crm-nav">
                <button class="active" data-section="orders" type="button">Заказы</button>
                <button data-section="clients" type="button">Клиенты</button>
                <span>Каталог <small>скоро</small></span>
                <span>Статистика <small>скоро</small></span>
                <span>Настройки <small>скоро</small></span>
            </nav>

            <div class="manager-user-panel">
                <div>
                    <span id="managerUserName">Проверка доступа...</span>
                    <strong id="managerUserRole"></strong>
                </div>
                <button id="logoutBtn" type="button">Выйти</button>
                <a href="index.html">На сайт</a>
            </div>
        </aside>

        <section class="crm-workspace">
            <header id="ordersTopbar" class="crm-topbar">
                <div>
                    <h1>Заказы</h1>
                    <p>Заявки с сайта MatMix</p>
                </div>
                <div class="crm-topbar-actions">
                    <div class="orders-stats" aria-label="Статистика заявок">
                        <span>Всего <strong id="ordersTotalCount">0</strong></span>
                        <span>Новые <strong id="ordersNewCount">0</strong></span>
                        <span>В работе <strong id="ordersWorkCount">0</strong></span>
                    </div>
                    <button id="refreshOrders" type="button">Обновить</button>
                </div>
            </header>

            <section class="manager-toolbar" aria-label="Фильтры заявок">
                <select id="statusFilter" class="visually-hidden" aria-label="Фильтр по статусу">
                    <option value="">Все</option>
                </select>
                <div id="statusTabs" class="status-tabs" role="tablist" aria-label="Фильтры по статусу"></div>
            </section>

            <p id="managerMessage" class="manager-message" aria-live="polite"></p>
            <section id="ordersList" class="orders-list" aria-label="Список заявок"></section>

            <section id="clientsView" class="clients-view hidden" aria-label="Список клиентов">
                <header class="crm-topbar">
                    <div>
                        <h1>Клиенты</h1>
                        <p>База клиентов MatMix</p>
                    </div>
                    <div class="crm-topbar-actions">
                        <div class="orders-stats" aria-label="Статистика клиентов">
                            <span>Всего <strong id="clientsTotalCount">0</strong></span>
                            <span>Повторные <strong id="repeatClientsCount">0</strong></span>
                            <span>Сумма <strong id="clientsTotalSpent">0 ₽</strong></span>
                        </div>
                    </div>
                </header>

                <div class="clients-toolbar">
                    <label>
                        <span>Поиск клиента</span>
                        <input id="clientSearchInput" type="search" placeholder="Имя или телефон" autocomplete="off">
                    </label>
                    <button id="refreshClients" type="button">Обновить</button>
                </div>

                <section id="clientsList" class="clients-list" aria-label="Клиенты"></section>
            </section>
        </section>
    </main>

    <script src="js/crm/state.js"></script>
    <script src="js/crm/orders.js"></script>
    <script src="js/crm/clients.js"></script>
    <script src="js/crm/actions.js"></script>
    <script src="js/crm/manager.js"></script>
</body>
</html>
